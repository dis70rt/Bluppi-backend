syntax = "proto3";

package room;
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "./internals/gen/rooms";

service RoomService {
    rpc CreateRoom(CreateRoomRequest) returns (Room);
    rpc GetRoom(GetRoomRequest) returns (Room);
    // rpc DeleteRoom(DeleteRoomRequest) returns (google.protobuf.Empty);

    rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse);
    // rpc SearchRooms(SearchRoomsRequest) returns (SearchRoomsResponse);

    rpc JoinRoom(JoinRoomRequest) returns (google.protobuf.Empty);
    rpc LeaveRoom(LeaveRoomRequest) returns (google.protobuf.Empty);

    rpc SubscribeToRoomEvents(SubscribeRequest) returns (stream RoomEvent);
    rpc GetListeners(GetListenersRequest) returns (GetListenersResponse);
    rpc SendLiveChatMessage(SendLiveChatMessageRequest) returns (google.protobuf.Empty);
}

enum RoomStatus {
    ROOM_STATUS_UNSPECIFIED = 0;
    ROOM_STATUS_ACTIVE = 1;
    ROOM_STATUS_ENDED = 2;
}

enum RoomVisibility {
    ROOM_VISIBILITY_UNSPECIFIED = 0;
    ROOM_VISIBILITY_PUBLIC = 1;
    ROOM_VISIBILITY_PRIVATE = 2;
}

enum RoomMemberRole {
    ROOM_MEMBER_ROLE_UNSPECIFIED = 0;
    ROOM_MEMBER_ROLE_HOST = 1;
    ROOM_MEMBER_ROLE_LISTENER = 2;
}

enum RoomEventType {
    ROOM_EVENT_TYPE_UNSPECIFIED = 0;
    ROOM_EVENT_TYPE_USER_JOINED = 1;
    ROOM_EVENT_TYPE_USER_LEFT = 2;
    ROOM_EVENT_TYPE_ROOM_ENDED = 3;
    ROOM_EVENT_TYPE_LIVE_CHAT_MESSAGE = 4;
}

message Room {
    string id = 1;
    string name = 2;
    string code = 3;

    RoomStatus status = 4;
    RoomVisibility visibility = 5;

    string host_user_id = 6;

    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
}

message RoomMember {
    string room_id = 1;
    string user_id = 2;
    RoomMemberRole role = 3;

    google.protobuf.Timestamp joined_at = 4;
    google.protobuf.Timestamp left_at = 5;
}

message RoomSummary {
    string room_id = 1;
    string room_name = 2;

    string track_id = 3;
    string track_title = 4;
    string track_artist = 5;
    string artwork_url = 6;

    string host_user_id = 7;
    string host_display_name = 8;

    int32 listener_count = 9;

    bool is_live = 10;
    RoomVisibility visibility = 11;
}

message SearchRoomsRequest {
    string query = 1;
    RoomVisibility visibility = 2;

    int32 page_size = 3;
    string page_token = 4;
}

message SearchRoomsResponse {
    repeated RoomSummary rooms = 1;
    string next_page_token = 2;
}

message CreateRoomRequest {
    string name = 1;
    RoomVisibility visibility = 2;
    bool invite_only = 3;
    string host_user_id = 4;
}

message GetRoomRequest {
    string room_id = 1;
}

message DeleteRoomRequest {
    string room_id = 1;
}

message JoinRoomRequest {
    oneof identifier {
        string room_id = 1;
        string room_code = 2;
    }
    string user_id = 3;
}

message LeaveRoomRequest {
    string room_id = 1;
    string user_id = 2;
}

message ListRoomsRequest {
    RoomVisibility visibility = 1;
    int32 page_size = 2;
    string page_token = 3;
}

message ListRoomsResponse {
    repeated RoomSummary rooms = 1;
    string next_page_token = 2;
}

message SubscribeRequest {
    string room_id = 1;
    string user_id = 2;
}

message GetListenersRequest {
    string room_id = 1;
}

message GetListenersResponse {
    repeated JoinedMember members = 1;
    int32 total_listeners = 2;
}

message JoinedMember {
    string user_id = 1;
    string username = 2;
    string display_name = 3;
    string avatar_url = 4;
}

message LeftMember {
    string user_id = 1;
}

message LiveChatMessage {
    string user_id = 1;
    string text = 2;
}

message RoomEvent {
    RoomEventType type = 1;
    string room_id = 2; 
    JoinedMember joined_member = 3;
    LeftMember left_member = 4;
    LiveChatMessage live_chat_message = 5;
}

message SendLiveChatMessageRequest {
    string room_id = 1;
    string user_id = 2;
    string text = 3;
}