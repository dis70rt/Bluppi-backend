syntax = "proto3";
package notifications;
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "./internals/gen/notifications";

service NotificationService {

  rpc RegisterDevice(RegisterDeviceRequest) returns (google.protobuf.Empty);
  rpc UnregisterDevice(UnregisterDeviceRequest) returns (google.protobuf.Empty);

  rpc GetPreferences(google.protobuf.Empty) returns (NotificationPreferences);
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (google.protobuf.Empty);

  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (google.protobuf.Empty);
  rpc DeleteNotification(DeleteNotificationRequest) returns (google.protobuf.Empty);
  rpc ClearHistory(google.protobuf.Empty) returns (google.protobuf.Empty);
  
  rpc GetUnreadCount(google.protobuf.Empty) returns (GetUnreadCountResponse);
}


enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_ANDROID = 1;
  DEVICE_TYPE_IOS = 2;
}

message RegisterDeviceRequest {
  string fcm_token = 1;
  DeviceType device_type = 2;
}

message UnregisterDeviceRequest {
  string fcm_token = 1;
}

message NotificationPreferences {
  bool push_notifications_enabled = 1;
  bool email_notifications_enabled = 2;
  bool party_invites_enabled = 3;
  bool new_followers_enabled = 4;
  bool follow_request_enabled = 5;
  bool follower_listening_enabled = 6;
}

message UpdatePreferencesRequest {
  NotificationPreferences preferences = 1;
}

message InAppNotification {
  string id = 1;
  string type = 2;         // 'PARTY_INVITE', 'NEW_FOLLOWER'
  string title = 3;
  string body = 4;
  string action_data = 5;
  bool is_read = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetHistoryRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetHistoryResponse {
  repeated InAppNotification notifications = 1;
  int32 total_unread = 2;
}

message MarkAsReadRequest {
  repeated string notification_ids = 1;
}

message GetUnreadCountResponse {
  int32 count = 1;
}

message DeleteNotificationRequest {
  string notification_id = 1;
}