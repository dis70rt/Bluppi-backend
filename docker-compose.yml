services:

  postgres:
    image: postgres:16
    container_name: bluppi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      CHAT_DB_NAME: ${CHAT_DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - /data/pgdata:/var/lib/postgresql/data

    networks:
      - cloudflared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  
  bluppi-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluppi-api
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "50051:50051"
    networks:
      - cloudflared

  solr:
    image: solr:9.10.1
    container_name: bluppi-solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - /data/solr-data:/var/solr
    environment:
      SOLR_JAVA_MEM: "-Xms2g -Xmx4g"
    networks:
      - cloudflared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3" 
  
  redis:
    image: redis:7-alpine
    container_name: bluppi-redis
    networks:
      - cloudflared
    ports:
      - "${REDIS_PORT}:6379"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  audio-api:
    build:
      context: ./audio
      dockerfile: Dockerfile
    container_name: bluppi-audio-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8001:8000"
    networks:
      - cloudflared


